<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NoesisGUI XAML Exporter</title>
<style>/* INJECT_CSS */</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-title">NoesisGUI XAML Exporter</span>
  <span class="header-meta" id="header-meta">No selection</span>
</div>

<!-- Toolbar -->
<div class="toolbar">
  <button class="btn" id="btn-copy" title="Copy XAML to clipboard">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M4 4h8v1H4V4zm0 2h8v1H4V6zm0 2h5v1H4V8z"/>
      <path fill-rule="evenodd" d="M2 2a1 1 0 0 1 1-1h7l3 3v9a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V2zm1 0v11h9V5l-2-2H3z"/>
    </svg>
    Copy XAML
  </button>

  <button class="btn btn-primary" id="btn-export" title="Export as .zip with XAML and assets">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M8 12l-4-4h2.5V4h3v4H12L8 12z"/>
      <path d="M2 13h12v1H2v-1z"/>
    </svg>
    Export .zip
  </button>

  <div class="toolbar-spacer"></div>

  <button class="btn" id="btn-refresh" title="Re-generate XAML">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M13.5 4.5A6 6 0 1 0 14 8h-1.5A4.5 4.5 0 1 1 8 3.5a4.5 4.5 0 0 1 3.18 1.32L9.5 6.5H14V2l-1.5 1.5z"/>
    </svg>
  </button>
</div>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-xaml">XAML</button>
  <button class="tab-btn" id="tab-names">Names</button>
</div>

<!-- Settings -->
<div class="settings">
  <div class="setting-item">
    <label for="opt-namespaces">Namespaces</label>
    <input type="checkbox" id="opt-namespaces" checked/>
  </div>
  <div class="setting-item">
    <label for="opt-resources">Include styles</label>
    <input type="checkbox" id="opt-resources"/>
  </div>
  <div class="setting-item">
    <label for="opt-indent">Indent</label>
    <select id="opt-indent">
      <option value="2" selected>2 spaces</option>
      <option value="4">4 spaces</option>
    </select>
  </div>
</div>

<!-- Warnings -->
<div class="warnings" id="warnings">
  <ul id="warnings-list"></ul>
</div>

<!-- XAML Preview -->
<div class="preview-area" id="preview-area">
  <div class="empty-state" id="empty-state">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <rect x="4" y="4" width="32" height="32" rx="4" stroke="currentColor" stroke-width="1.5"/>
      <path d="M12 14h16M12 20h10M12 26h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <h3>Select a frame to export</h3>
    <p>Select any frame, component, or layer in Figma to preview the generated XAML.</p>
  </div>
  <div class="xaml-preview" id="xaml-output" style="display:none"></div>
</div>

<!-- Names Review Panel -->
<div class="review-area" id="review-area" style="display:none">
  <div class="review-empty" id="review-empty" style="display:none">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="14" stroke="currentColor" stroke-width="1.5"/>
      <path d="M14 20l4 4 8-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h3>All names look good</h3>
    <p>No naming issues found in the current selection.</p>
  </div>
  <div class="review-list" id="review-list"></div>
</div>

<!-- Review footer (Apply button) -->
<div class="review-footer" id="review-footer" style="display:none">
  <span id="review-count" class="review-count-label"></span>
  <button class="btn btn-primary" id="btn-apply">Apply renames</button>
</div>

<!-- Status bar -->
<div class="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Ready</span>
  <span class="status-spacer"></span>
  <span id="status-lines" style="color:var(--text-dim)"></span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>// INJECT_JS</script>
</body>
</html>
